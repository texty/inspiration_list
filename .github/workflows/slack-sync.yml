name: Slack Link Sync

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:       # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install slack-sdk requests beautifulsoup4

      - name: Run sync
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python bot.py

      - name: Commit changes
        run: |
          git config user.name "link-saver-bot"
          git config user.email "link-saver-bot@noreply.github.com"
          git add links.json bot_state.json
          git diff --cached --quiet || (
            git commit -m "bot: sync links from Slack [skip ci]" &&
            git push
          )